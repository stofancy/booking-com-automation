name: Package Skill

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate skill
        run: npm run validate

      - name: Package skill
        run: npm run package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: booking-com-automation-skill
          path: 'dist/*.skill'
          retention-days: 30

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: 'dist/*.skill'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
